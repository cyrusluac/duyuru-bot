<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Duyuru Bot</title></head><body style="background:#080b10;color:#fff;font-family:monospace;padding:20px;max-width:500px;margin:0 auto"><h2 style="color:#29b6f6">✈️ BuzAjans Duyuru</h2><br><textarea id="m" style="width:100%;height:150px;background:#0d1520;color:#fff;border:1px solid #1a2332;border-radius:8px;padding:12px;font-size:14px" placeholder="Mesajınızı yazın..."></textarea><br><br><button onclick="send()" style="width:100%;padding:16px;background:#0088cc;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer">📢 GÖNDER</button><br><br><div id="log" style="color:#00e676;font-size:12px"></div><script>async function send(){const m=document.getElementById('m').value.trim();if(!m){alert('Mesaj boş!');return}document.getElementById('log').textContent='Gönderiliyor...';const r=await fetch('https://api.telegram.org/bot8789549704:AAEE0eDE2QDy4CBFRrStb0X0XerMjwrM-wI/sendMessage?chat_id=-1003791533428&text='+encodeURIComponent(m));const d=await r.json();document.getElementById('log').textContent=d.ok?'✅ Gönderildi! ID:'+d.result.message_id:'❌ Hata: '+d.description}</script></body></html>
