<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuzAjans NEURAL v6.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --bg: #030303;
            --card: #0d0d12;
            --accent: #ff00ff; /* Neon Magenta */
            --cyan: #00ffff;
            --gold: #ffcc00;
            --border: #22222b;
            --text: #ffffff;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 30px; font-size: 14px; }

        /* --- UI Elements --- */
        .neural-grid { display: grid; grid-template-columns: 280px 1fr 320px; gap: 20px; max-width: 1600px; margin: 0 auto; }
        .module { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; position: relative; }
        
        /* Neon Header */
        .title-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .title-bar h2 { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--cyan); }
        .ping { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--gold); }

        /* Inputs */
        textarea, input, select {
            width: 100%; background: #000; border: 1px solid var(--border); border-radius: 8px; 
            padding: 12px; color: #fff; margin-bottom: 10px; transition: 0.3s;
        }
        textarea:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px rgba(255,0,255,0.2); }

        /* Snippet Buttons */
        .snippet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .s-btn { background: #1a1a25; border: 1px solid var(--border); color: #ccc; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .s-btn:hover { background: var(--border); color: var(--cyan); }

        /* Voice Button */
        .mic-btn {
            background: linear-gradient(45deg, #ff0055, #ff00ff); border: none; padding: 10px;
            border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* Queue System */
        .queue-item { background: #000; border: 1px solid var(--border); padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 12px; }

        /* Command Button */
        .cmd-btn {
            width: 100%; padding: 18px; background: none; border: 2px solid var(--cyan); color: var(--cyan);
            font-weight: 800; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .cmd-btn:hover { background: var(--cyan); color: #000; box-shadow: 0 0 20px rgba(0,255,255,0.4); }

        /* Glow Animations */
        .pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    </style>
</head>
<body>

<div class="neural-grid">
    <div class="module">
        <div class="title-bar">
            <h2>Hızlı Komutlar</h2>
        </div>
        
        <div class="snippet-grid">
            <button class="s-btn" onclick="addSnippet('rules')">⚖️ Kurallar</button>
            <button class="s-btn" onclick="addSnippet('price')">💰 Fiyatlar</button>
            <button class="s-btn" onclick="addSnippet('contact')">📩 İletişim</button>
            <button class="s-btn" onclick="addSnippet('bank')">🏦 Ödeme</button>
        </div>

        <span style="font-size: 11px; color: var(--gold);">Otomatik Değişkenler:</span>
        <div style="font-size: 10px; color: #666; margin-top: 5px; line-height: 1.6;">
            {tarih} - Güncel Tarih<br>
            {saat} - Güncel Saat<br>
            {id} - Benzersiz İşlem ID
        </div>

        <hr style="border:0; border-top:1px solid var(--border); margin: 20px 0;">
        
        <div class="title-bar">
            <h2>Kuyruk (Queue)</h2>
        </div>
        <div id="queueList">
            <div style="color: #444; font-size: 11px;">Bekleyen işlem yok...</div>
        </div>
    </div>

    <div class="module">
        <div class="title-bar">
            <h2>Neural Editor</h2>
            <div class="ping" id="pingDisplay">Lat: 0ms</div>
        </div>

        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
            <input type="text" id="mediaUrl" placeholder="Görsel, Video veya Belge URL'si..." style="margin:0;">
            <button class="mic-btn" onclick="startVoice()" title="Sesle Yaz">🎤</button>
        </div>

        <textarea id="mainEditor" rows="15" placeholder="Mesajınızı kurgulayın..."></textarea>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
            <button class="cmd-btn" style="border-color: var(--accent); color: var(--accent);" onclick="addToQueue()">SIRAYA EKLE</button>
            <button class="cmd-btn" onclick="sendNeural()">SİSTEMİ TETİKLE</button>
            <button class="cmd-btn" style="border-color: #fff; color: #fff;" onclick="clearAll()">RESET</button>
        </div>
    </div>

    <div class="module">
        <div class="title-bar">
            <h2>Otonom Mod</h2>
            <div class="pulse" style="width:8px; height:8px; background:red; border-radius:50%"></div>
        </div>

        <div style="background: #000; padding: 15px; border-radius: 12px; margin-bottom: 20px;">
            <label style="font-size: 10px; color: var(--cyan);">GÜNLÜK PLANLAYICI</label>
            <input type="time" id="planTime" style="margin-top:5px;">
            <button class="s-btn" style="width:100%" onclick="savePlan()">Planı Kaydet</button>
        </div>

        <div id="statsArea" style="font-family: 'JetBrains Mono'; font-size: 12px; color: #888;">
            > Total Sent: <span id="st-total" style="color: var(--cyan);">0</span><br>
            > Success Rate: <span style="color: var(--gold);">100%</span><br>
            > Last Broadcast: <span id="st-last">None</span>
        </div>

        <div id="logNeural" style="margin-top: 20px; font-size: 10px; color: #555; height: 150px; overflow-y: auto; border-top: 1px solid var(--border); padding-top: 10px;">
            [SYSTEM] Neural Engine v6.0 Online...
        </div>
    </div>
</div>

<script>
    const API = {
        token: '8789549704:AAEE0eDE2QDy4CBFRrStb0X0XerMjwrM-wI',
        chatId: '-1003791533428'
    };

    // --- SES TANIMA ---
    function startVoice() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!Speech) return alert("Tarayıcınız ses desteği sunmuyor.");
        const rec = new Speech();
        rec.lang = 'tr-TR';
        rec.onstart = () => log("Ses dinleniyor...", "var(--accent)");
        rec.onresult = (e) => {
            document.getElementById('mainEditor').value += e.results[0][0].transcript;
        };
        rec.start();
    }

    // --- SNIPPETS ---
    function addSnippet(type) {
        const area = document.getElementById('mainEditor');
        const data = {
            rules: "⚠️ **GRUP KURALLARI**\n1. Küfür yasaktır.\n2. Spam yapmayın.",
            price: "💰 **GÜNCEL FİYAT LİSTESİ**\n- Standart: 100₺\n- Premium: 250₺",
            contact: "📩 **DESTEK HATTI**\n@BuzAjansDestek",
            bank: "🏦 **ÖDEME BİLGİLERİ**\nIBAN: TR00 0000..."
        };
        area.value += data[type];
    }

    // --- DEĞİŞKENLERİ DÖNÜŞTÜR ---
    function parseVariables(text) {
        const now = new Date();
        return text
            .replace(/{tarih}/g, now.toLocaleDateString('tr-TR'))
            .replace(/{saat}/g, now.toLocaleTimeString('tr-TR'))
            .replace(/{id}/g, Math.random().toString(36).substr(2, 9).toUpperCase());
    }

    // --- ANALİTİK PİNG ---
    setInterval(async () => {
        const start = Date.now();
        try {
            await fetch(`https://api.telegram.org/bot${API.token}/getMe`);
            document.getElementById('pingDisplay').textContent = `Lat: ${Date.now() - start}ms`;
        } catch(e) {}
    }, 5000);

    // --- SIRALAMA SİSTEMİ ---
    const queue = [];
    function addToQueue() {
        const msg = document.getElementById('mainEditor').value;
        if(!msg) return;
        queue.push({ msg, time: new Date().toLocaleTimeString() });
        updateQueueUI();
        log("Mesaj sıraya eklendi.");
    }

    function updateQueueUI() {
        const container = document.getElementById('queueList');
        container.innerHTML = queue.map((item, index) => `
            <div class="queue-item">
                <b>#${index+1}</b> ${item.msg.substring(0, 30)}... <br>
                <small style="color:var(--cyan)">Eklenme: ${item.time}</small>
            </div>
        `).join('');
    }

    // --- GÖNDERİM ---
    async function sendNeural() {
        let text = document.getElementById('mainEditor').value;
        const media = document.getElementById('mediaUrl').value;
        
        text = parseVariables(text);
        log("İşlem başlatıldı...");

        let method = "sendMessage";
        let payload = { chat_id: API.chatId, parse_mode: 'HTML', text: text };

        if(media) {
            const ext = media.split('.').pop().toLowerCase();
            if(['jpg', 'jpeg', 'png'].includes(ext)) method = "sendPhoto", payload.photo = media, payload.caption = text;
            else if(['mp4'].includes(ext)) method = "sendVideo", payload.video = media, payload.caption = text;
            else method = "sendDocument", payload.document = media, payload.caption = text;
        }

        try {
            const res = await fetch(`https://api.telegram.org/bot${API.token}/${method}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.ok) {
                log("Broadcasting Successful!", "var(--cyan)");
                document.getElementById('st-total').textContent = parseInt(document.getElementById('st-total').textContent) + 1;
                document.getElementById('st-last').textContent = new Date().toLocaleTimeString();
            } else {
                log("Error: " + data.description, "red");
            }
        } catch(e) { log("Fatal Error: Connection Lost", "red"); }
    }

    function log(msg, color = "#555") {
        const l = document.getElementById('logNeural');
        l.innerHTML = `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>` + l.innerHTML;
    }

    function clearAll() {
        document.getElementById('mainEditor').value = "";
        document.getElementById('mediaUrl').value = "";
    }
</script>

</body>
</html>
