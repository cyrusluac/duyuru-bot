<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuzAjans QUANTUM v5.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap');

        :root {
            --bg: #020205;
            --panel: #0a0a12;
            --accent: #00ffa3;
            --neon-blue: #00d1ff;
            --neon-purple: #9d00ff;
            --text: #e0e0e0;
            --border: #1a1a2e;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Space Grotesk', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; padding: 20px; }

        /* Background Animation */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, transparent 80%);
            z-index: -1; opacity: 0.5;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .main-panel, .side-panel {
            background: var(--panel);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 25px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        /* --- Header --- */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-weight: 700; font-size: 24px; background: linear-gradient(to right, var(--accent), var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-pill { background: rgba(0,255,163,0.1); border: 1px solid var(--accent); color: var(--accent); padding: 5px 15px; border-radius: 50px; font-size: 12px; display: flex; align-items: center; gap: 8px; }

        /* --- Inputs --- */
        .field-label { font-size: 12px; color: var(--neon-blue); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; display: block; }
        textarea, input, select {
            width: 100%; background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: #fff; margin-bottom: 20px; transition: 0.3s;
        }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,255,163,0.2); outline: none; }

        /* --- Scheduler (Planlayıcı) --- */
        .scheduler-box {
            background: rgba(157, 0, 255, 0.05);
            border: 1px dashed var(--neon-purple);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        /* --- Button Matrix --- */
        .btn-matrix { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; margin-bottom: 10px; }
        .add-btn { background: none; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 20px; }

        /* --- Preview --- */
        .preview-phone {
            background: #1c1c1c;
            border-radius: 30px;
            padding: 15px;
            height: 400px;
            border: 4px solid #333;
            position: relative;
        }
        .msg-bubble { background: #2b2b2b; padding: 10px; border-radius: 10px; font-size: 14px; margin-bottom: 10px; }
        .preview-btn { background: #3a3a3a; color: #4facfe; text-align: center; padding: 8px; border-radius: 5px; font-size: 12px; margin-top: 5px; border: 1px solid #4facfe; }

        /* --- Send Button --- */
        .launch-btn {
            width: 100%; padding: 20px; background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); border: none; border-radius: 15px; color: white; font-weight: 700; cursor: pointer; font-size: 18px; margin-top: 10px;
        }
        .launch-btn:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* --- Terminal --- */
        .terminal { background: #000; height: 150px; border-radius: 12px; padding: 10px; font-family: 'JetBrains Mono'; font-size: 11px; overflow-y: auto; color: #888; border: 1px solid var(--border); }
        .log-green { color: var(--accent); }
        .log-purple { color: var(--neon-purple); }

        @media (max-width: 900px) { .grid-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="grid-layout">
    <div class="main-panel">
        <div class="header">
            <h1>QUANTUM DUYURU V5</h1>
            <div class="status-pill"><div style="width:8px; height:8px; background:var(--accent); border-radius:50%"></div> AKTİF</div>
        </div>

        <div class="scheduler-box">
            <span class="field-label">⏰ Otonom Planlayıcı (Her Gün)</span>
            <div style="display: flex; gap: 15px;">
                <input type="time" id="scheduleTime" style="margin:0;">
                <button onclick="setSchedule()" class="add-btn" style="margin:0; width: 150px;">ZAMANI KUR</button>
            </div>
            <div id="countdown" style="font-size: 12px; margin-top: 10px; color: var(--neon-purple);">Planlayıcı beklemede...</div>
        </div>

        <span class="field-label">Mesaj İçeriği</span>
        <textarea id="mainText" rows="8" placeholder="HTML destekli mesajınızı yazın..." oninput="updatePreview()"></textarea>

        <span class="field-label">Medya Linki (Foto/Video)</span>
        <input type="text" id="mediaUrl" placeholder="https://... (Görsel veya Video Linki)" oninput="updatePreview()">

        <span class="field-label">Buton Matrisi</span>
        <div id="buttonContainer"></div>
        <button class="add-btn" onclick="addButton()">+ Yeni Buton Ekle</button>

        <div class="terminal" id="logger">
            <div>> Quantum Terminal Ready...</div>
        </div>
    </div>

    <div class="side-panel">
        <span class="field-label">Canlı Önizleme</span>
        <div class="preview-phone">
            <div id="p-media" style="width:100%; height:150px; background:#333; border-radius:10px; margin-bottom:10px; display:none; background-size:cover;"></div>
            <div class="msg-bubble" id="p-text">Mesajınız burada görünecek...</div>
            <div id="p-btns"></div>
        </div>

        <div style="margin-top: 25px;">
            <span class="field-label">Sistem Ayarları</span>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <select id="parseMode">
                    <option value="HTML">HTML</option>
                    <option value="Markdown">Markdown</option>
                </select>
                <select id="priority">
                    <option value="high">Yüksek Hız</option>
                    <option value="silent">Sessiz Mod</option>
                </select>
            </div>
            
            <button class="launch-btn" onclick="sendNow()">HEMEN GÖNDER</button>
            <p style="text-align: center; font-size: 10px; color: var(--text-dim); margin-top: 15px;">* Planlanan mesajlar için bu sekmenin açık kalması gerekir.</p>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        token: '8789549704:AAEE0eDE2QDy4CBFRrStb0X0XerMjwrM-wI',
        chatId: '-1003791533428'
    };

    let scheduledTime = localStorage.getItem('scheduledTime') || "";
    if(scheduledTime) document.getElementById('scheduleTime').value = scheduledTime;

    // --- BUTON SİSTEMİ ---
    function addButton() {
        const div = document.createElement('div');
        div.className = 'btn-matrix';
        div.innerHTML = `
            <input type="text" placeholder="Metin" class="b-label" oninput="updatePreview()">
            <input type="text" placeholder="URL" class="b-url" oninput="updatePreview()">
            <button onclick="this.parentElement.remove(); updatePreview()" style="background:none; border:none; color:red; cursor:pointer">X</button>
        `;
        document.getElementById('buttonContainer').appendChild(div);
    }

    // --- CANLI ÖNİZLEME ---
    function updatePreview() {
        const text = document.getElementById('mainText').value;
        const media = document.getElementById('mediaUrl').value;
        
        document.getElementById('p-text').innerHTML = text || "Mesajınız burada görünecek...";
        
        const mediaDiv = document.getElementById('p-media');
        if(media) {
            mediaDiv.style.display = "block";
            mediaDiv.style.backgroundImage = `url('${media}')`;
        } else {
            mediaDiv.style.display = "none";
        }

        const btnContainer = document.getElementById('p-btns');
        btnContainer.innerHTML = "";
        document.querySelectorAll('.btn-matrix').forEach(row => {
            const label = row.querySelector('.b-label').value;
            if(label) {
                const b = document.createElement('div');
                b.className = "preview-btn";
                b.textContent = label;
                btnContainer.appendChild(b);
            }
        });
    }

    // --- LOG SİSTEMİ ---
    function log(msg, color = "") {
        const logger = document.getElementById('logger');
        const div = document.createElement('div');
        div.style.color = color;
        div.textContent = `[${new Date().toLocaleTimeString()}] > ${msg}`;
        logger.prepend(div);
    }

    // --- PLANLAYICI (CRON) ---
    function setSchedule() {
        scheduledTime = document.getElementById('scheduleTime').value;
        localStorage.setItem('scheduledTime', scheduledTime);
        log(`Duyuru her gün ${scheduledTime} saatine kuruldu.`, "var(--neon-purple)");
    }

    setInterval(() => {
        if(!scheduledTime) return;
        
        const now = new Date();
        const current = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        
        const [h, m] = scheduledTime.split(':');
        const target = new Date();
        target.setHours(h, m, 0);

        let diff = target - now;
        if(diff < 0) diff += 86400000; // Yarın için

        const hours = Math.floor(diff / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        const secs = Math.floor((diff % 60000) / 1000);

        document.getElementById('countdown').textContent = `Sonraki Otomatik Duyuru: ${hours}sa ${mins}dk ${secs}sn`;

        if(current === scheduledTime && now.getSeconds() === 0) {
            log("Otomatik zamanlama tetiklendi! Gönderiliyor...", "var(--accent)");
            sendNow();
        }
    }, 1000);

    // --- GÖNDERİM MOTORU ---
    async function sendNow() {
        const text = document.getElementById('mainText').value;
        const media = document.getElementById('mediaUrl').value;
        const parseMode = document.getElementById('parseMode').value;
        const priority = document.getElementById('priority').value;

        // Butonları Derle
        const buttons = [];
        document.querySelectorAll('.btn-matrix').forEach(row => {
            const label = row.querySelector('.b-label').value;
            const url = row.querySelector('.b-url').value;
            if(label && url) buttons.push([{ text: label, url: url }]);
        });

        let method = media ? "sendPhoto" : "sendMessage";
        let payload = {
            chat_id: CONFIG.chatId,
            parse_mode: parseMode,
            disable_notification: (priority === 'silent'),
            reply_markup: { inline_keyboard: buttons }
        };

        if(media) {
            payload.photo = media;
            payload.caption = text;
        } else {
            payload.text = text;
        }

        try {
            const res = await fetch(`https://api.telegram.org/bot${CONFIG.token}/${method}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.ok) {
                log("Duyuru başarıyla yayına girdi!", "var(--accent)");
            } else {
                log("Hata: " + data.description, "red");
            }
        } catch (e) {
            log("Bağlantı hatası!", "red");
        }
    }

    // Başlangıçta önizlemeyi çalıştır
    updatePreview();
</script>

</body>
</html>
